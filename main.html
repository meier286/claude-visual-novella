<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Звонок с неизвестного номера</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');

  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', Arial, sans-serif; background: #0d1017; color: #f2ede3; height: 100vh; width: 100vw; overflow: hidden; }
  button { cursor: pointer; font-family: inherit; }

  #app { position: relative; height: 100vh; width: 100vw; }
  .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .4s ease; }
  .screen.active { opacity: 1; pointer-events: auto; }

  /* ---- street ---- */
  #screen-street { background: radial-gradient(ellipse at 50% 18%, #2a3350 0%, transparent 55%), linear-gradient(180deg, #161c28 0%, #0d1017 60%); flex-direction: column; justify-content: flex-end; }
  .buildings { position: absolute; bottom: 0; left: 0; right: 0; height: 32%; display: flex; align-items: flex-end; }
  .bld { background: #141a26; flex: none; border-top: 2px solid #1c2333; }
  .lamp { position: absolute; bottom: 14%; left: 22%; width: 4px; height: 28%; background: #20293c; }
  .lamp::before { content: ''; position: absolute; top: -8px; left: -6px; width: 16px; height: 16px; border-radius: 50%; background: #ffb84d; box-shadow: 0 0 40px 18px rgba(255,184,77,.35); }
  .stats-bar { position: absolute; top: 22px; left: 0; right: 0; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #7d859e; opacity: 0; transition: opacity .5s ease; }
  .stats-bar.show { opacity: 1; }
  .hint { position: absolute; bottom: 6%; left: 0; right: 0; text-align: center; font-size: 13px; color: #6b7390; opacity: 0; transition: opacity .5s ease; }
  .hint.show { opacity: 1; }
  .decline-msg { position: absolute; bottom: 15%; left: 8%; right: 8%; text-align: center; font-size: 13px; color: #8891ab; opacity: 0; transition: opacity .4s ease; }
  .decline-msg.show { opacity: 1; }
  .phone-fab { position: absolute; bottom: 8%; right: 8%; width: 60px; height: 60px; border-radius: 50%; background: #41d68c; border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(65,214,140,.35); opacity: 0; transform: scale(.6); transition: opacity .4s ease, transform .4s ease; }
  .phone-fab.show { opacity: 1; transform: scale(1); }
  .phone-fab.ring { animation: ringshake 1s ease-in-out infinite; }
  .phone-fab::after { content: ''; position: absolute; inset: -12px; border-radius: 50%; border: 2px solid rgba(65,214,140,.5); animation: pulse-ring 1.6s ease-out infinite; }
  @keyframes pulse-ring { 0% { transform: scale(.7); opacity: .9; } 100% { transform: scale(1.9); opacity: 0; } }
  @keyframes ringshake { 0%,100% { transform: rotate(0); } 20% { transform: rotate(-14deg); } 40% { transform: rotate(12deg); } 60% { transform: rotate(-8deg); } 80% { transform: rotate(6deg); } }
  .phone-fab svg { width: 24px; height: 24px; fill: #0b0d12; }

  /* ---- phone frame ---- */
  .phone-frame { width: min(340px, 90vw); height: min(620px, 86vh); background: linear-gradient(180deg, #161c28, #0f1420); border-radius: 32px; border: 6px solid #05070c; box-shadow: 0 30px 70px rgba(0,0,0,.6); display: flex; flex-direction: column; overflow: hidden; position: relative; }

  #screen-incoming .phone-frame { align-items: center; justify-content: space-between; padding: 56px 24px 36px; }
  .caller-avatar { width: 84px; height: 84px; border-radius: 50%; margin: 0 auto 16px; background: linear-gradient(145deg, #1c64f2, #12305e); display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 600; }
  .caller-name { font-size: 19px; font-weight: 600; margin: 0 0 4px; }
  .caller-sub { font-size: 12px; color: #7d859e; font-family: 'JetBrains Mono', monospace; }
  .incoming-actions { display: flex; justify-content: space-between; width: 100%; padding: 0 10px; }
  .call-btn { width: 54px; height: 54px; border-radius: 50%; border: none; }
  .call-btn.decline { background: #ff5c5c; }
  .call-btn.accept { background: #41d68c; animation: pulse-btn 1.4s ease-in-out infinite; }
  @keyframes pulse-btn { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  .call-btn svg { width: 22px; height: 22px; fill: #0b0d12; }

  #screen-call .phone-frame { padding-top: 44px; }
  .call-top { text-align: center; padding: 0 18px 6px; flex: none; }
  .call-top .caller-name { font-size: 16px; }
  .call-timer { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #41d68c; }

  .meters { margin: 6px 18px 4px; flex: none; display: flex; flex-direction: column; gap: 7px; }
  .meter-label { display: flex; justify-content: space-between; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: #7d859e; margin-bottom: 3px; }
  .meter-label span.val { font-family: 'JetBrains Mono', monospace; color: #f2ede3; }
  .meter-track { height: 6px; border-radius: 4px; background: #232a3c; overflow: hidden; }
  .meter-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
  .meter-fill.stress { background: linear-gradient(90deg,#6b2f2f,#ff5c5c); }
  .meter-fill.suspicion { background: linear-gradient(90deg,#215a44,#41d68c); }

  .thread { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; gap: 10px; }
  .bubble { max-width: 82%; padding: 10px 13px; border-radius: 14px; font-size: 14px; line-height: 1.4; opacity: 0; transform: translateY(6px); animation: bubble-in .35s ease forwards; }
  @keyframes bubble-in { to { opacity: 1; transform: translateY(0); } }
  .bubble.them { align-self: flex-start; background: #12305e; border: 1px solid rgba(28,100,242,.35); border-bottom-left-radius: 4px; }
  .bubble.me { align-self: flex-end; background: #232b3f; border: 1px solid #323c56; border-bottom-right-radius: 4px; }
  .typing { align-self: flex-start; display: flex; gap: 4px; padding: 12px 15px; background: #12305e; border: 1px solid rgba(28,100,242,.35); border-radius: 14px; border-bottom-left-radius: 4px; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: #7fa4f7; animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100% { opacity: .25; } 40% { opacity: 1; } }

  .choices { flex: none; padding: 10px 12px 16px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #1e2536; }
  .choice-btn { text-align: left; background: #1a2033; border: 1px solid #2a3247; color: #f2ede3; padding: 10px 12px; border-radius: 12px; font-size: 13px; line-height: 1.3; }
  .choice-btn:hover { background: #232b45; border-color: #ffb84d; }

  /* ---- ending: report card ---- */
  #screen-ending { padding: 20px; }
  .report-card { width: min(360px, 92vw); max-height: 88vh; overflow-y: auto; background: #f2ede3; color: #0b0d12; border-radius: 6px; padding: 24px 24px 22px; position: relative; box-shadow: 0 30px 60px rgba(0,0,0,.5); }
  .report-card::before { content: 'ОТЧЁТ О ЗВОНКЕ'; position: absolute; top: -11px; left: 22px; background: #0b0d12; color: #f2ede3; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .1em; padding: 3px 10px; }
  #endImage { display: none; width: 100%; max-height: 160px; object-fit: cover; border-radius: 4px; margin-bottom: 12px; }
  .stamp { display: inline-block; font-family: 'Oswald', sans-serif; font-size: 14px; letter-spacing: .05em; padding: 7px 14px; border: 3px solid currentColor; border-radius: 4px; transform: rotate(-4deg); margin-bottom: 14px; }
  .stamp.win { color: #2fa96a; } .stamp.lose { color: #d3453f; } .stamp.funny { color: #b98a0e; }
  .report-title { font-family: 'Oswald', sans-serif; font-size: 21px; margin: 8px 0 10px; }
  .report-story { font-size: 13.5px; line-height: 1.5; margin-bottom: 14px; }
  .report-tactic { font-size: 12.5px; line-height: 1.5; padding: 11px 13px; background: #e7e1d2; border-left: 3px solid #1c64f2; margin-bottom: 18px; }
  .report-tactic b { display: block; font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; color: #1c64f2; }
  #endActions { display: flex; flex-direction: column; gap: 8px; }
  .retry-btn { display: block; width: 100%; border: none; padding: 12px; background: #0b0d12; color: #f2ede3; border-radius: 6px; font-weight: 600; font-size: 14px; font-family: 'Oswald', sans-serif; letter-spacing: .03em; }
  .retry-btn.ghost { background: transparent; color: #0b0d12; border: 1px solid #0b0d12; }
</style>
</head>
<body>
<div id="app">

  <div id="screen-street" class="screen active">
    <div class="stats-bar" id="statsBar"></div>
    <div class="buildings" id="buildings"></div>
    <div class="lamp"></div>
    <div class="hint" id="hint">телефон завибрировал в кармане…</div>
    <div class="decline-msg" id="declineMsg">ты сбросил звонок. может, это была мама.</div>
    <button class="phone-fab" id="phoneFab" aria-label="Ответить">
      <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.4 0 .8-.2 1L6.6 10.8z"/></svg>
    </button>
  </div>

  <div id="screen-incoming" class="screen">
    <div class="phone-frame">
      <div>
        <div class="caller-avatar" id="incomingAvatar">СБ</div>
        <div class="caller-name" id="incomingName" style="text-align:center;">Служба Безопасности Банка</div>
        <div class="caller-sub" id="incomingSub" style="text-align:center;">+7 900 XXX-XX-XX</div>
      </div>
      <div class="incoming-actions">
        <button class="call-btn decline" id="declineBtn"><svg viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.1.3-4.5.8-.4.2-.9.1-1.2-.2l-2-2c-.4-.4-.4-1 0-1.4C6.9 3.9 9.4 3 12 3s5.1.9 7.7 3.2c.4.4.4 1 0 1.4l-2 2c-.3.3-.8.4-1.2.2C15.1 9.3 13.6 9 12 9z" transform="rotate(180 12 12)"/></svg></button>
        <button class="call-btn accept" id="acceptBtn"><svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.4 0 .8-.2 1L6.6 10.8z"/></svg></button>
      </div>
    </div>
  </div>

  <div id="screen-call" class="screen">
    <div class="phone-frame">
      <div class="call-top">
        <div class="caller-name" id="callName">Служба Безопасности Банка</div>
        <div class="call-timer" id="callTimer">00:00</div>
      </div>
      <div class="meters">
        <div>
          <div class="meter-label"><span>Стресс</span><span class="val" id="stressVal">20</span></div>
          <div class="meter-track"><div class="meter-fill stress" id="stressFill" style="width:20%"></div></div>
        </div>
        <div>
          <div class="meter-label"><span>Бдительность</span><span class="val" id="suspVal">20</span></div>
          <div class="meter-track"><div class="meter-fill suspicion" id="suspFill" style="width:20%"></div></div>
        </div>
      </div>
      <div class="thread" id="thread"></div>
      <div class="choices" id="choices"></div>
    </div>
  </div>

  <div id="screen-ending" class="screen">
    <div class="report-card">
      <div class="stamp" id="endStamp"></div>
      <img id="endImage" alt="">
      <div class="report-title" id="endTitle"></div>
      <div class="report-story" id="endStory"></div>
      <div class="report-tactic"><b>Приём мошенника</b><span id="endTactic"></span></div>
      <div id="endActions"></div>
    </div>
  </div>

</div>

<script>
/* ============================================================
   Теперь сценариев несколько — SCENARIOS хранит их по ключу,
   а на каждый новый звонок случайно выбирается один из них
   (кроме того, что звонил только что).
   ============================================================ */
const SCENARIOS = {
  zvonok_1: {
    caller: { name: "Служба Безопасности Банка", sub: "+7 900 412-98-06 · номер не в контактах", avatar: "СБ" },
    start: "start",
    nodes: {
      start: { text: "Здравствуйте! Это служба безопасности банка. Зафиксирована подозрительная операция на 48 700 рублей. Это вы её совершали?",
        choices: [
          { text: "Нет! Что мне делать?!", next: "pressure", stress: 15, suspicion: -5 },
          { text: "А вы вообще кто?", next: "suspicious", stress: 5, suspicion: 20 },
          { text: "Спишите ещё раз, мне как раз есть кому долг отдавать.", next: "funny1", stress: -5, suspicion: 10 }
        ]},
      pressure: { text: "Чтобы отменить операцию прямо сейчас, продиктуйте код из смс, которая вам придёт.",
        choices: [
          { text: "Хорошо, диктую код...", next: "end_lose", stress: 20, suspicion: -10 },
          { text: "Погодите, а зачем банку мой код?", next: "end_win", stress: -10, suspicion: 25 }
        ]},
      suspicious: { text: "Отдел безопасности, сотрудник номер 4471. Чтобы отменить операцию, продиктуйте код из смс.",
        choices: [
          { text: "Хорошо, диктую...", next: "end_lose", stress: 20, suspicion: -10 },
          { text: "Настоящий банк код по телефону не спрашивает. До свидания.", next: "end_win", stress: -10, suspicion: 25 }
        ]},
      funny1: { text: "Гражданин, вы вообще понимаете серьёзность ситуации?! Ваши деньги улетают прямо сейчас!",
        choices: [
          { text: "Ничего, переживу — там всё равно рублей 200 было.", next: "end_funny", stress: -5, suspicion: 10 },
          { text: "Ладно-ладно, диктуйте, что делать.", next: "pressure", stress: 10, suspicion: -10 }
        ]},
      end_win: { ending: "win", title: "🎉 Ты не попался", story: "Ты не стал называть код и положил трубку. Позже в банке подтвердили: звонок был мошенническим.", tactic: "Искусственная срочность и фальшивый авторитет. Настоящий банк никогда не запрашивает код из смс по телефону." },
      end_lose: { ending: "lose", title: "💸 Увы, тебя обманули", story: "Ты продиктовал код из смс. Через минуту пришло сообщение о списании денег со счёта.", tactic: "Код из смс — одноразовый пароль. Его нельзя называть никому, даже банку." },
      end_funny: { ending: "funny", title: "🤡 Эпичный провал мошенника", story: "Ты философски отнёсся к потере 200 рублей. Собеседник растерянно замолчал — и сам бросил трубку.", tactic: "Мошенники называют крупную сумму нарочно — маленькая никого не пугает." }
    }
  },

  zvonok_2: {
    caller: { name: "Всероссийская Лотерея Удачи", sub: "+7 800 555-01-02 · бесплатный звонок", avatar: "ВЛ" },
    start: "start",
    nodes: {
      start: { text: "Здравствуйте! Поздравляем, ваш номер выиграл в лотерее автомобиль Lada Vesta и 500 000 рублей! Для получения приза нужно оплатить страховой сбор — 3 200 рублей.",
        choices: [
          { text: "Ого! Куда платить?!", next: "excited", stress: 15, suspicion: -5 },
          { text: "А я разве участвовал в лотерее?", next: "suspicious", stress: 5, suspicion: 20 },
          { text: "А можно сразу деньгами, без машины? Гараж некуда ставить.", next: "funny1", stress: -5, suspicion: 10 }
        ]},
      excited: { text: "Прекрасно! Продиктуйте номер карты и код с обратной стороны — оператор оформит перевод сбора.",
        choices: [
          { text: "Диктую номер карты...", next: "end_lose", stress: 20, suspicion: -10 },
          { text: "Погодите, а почему я плачу, чтобы получить свой же выигрыш?", next: "end_win", stress: -10, suspicion: 25 }
        ]},
      suspicious: { text: "Номер был зарегистрирован автоматически при подписке на новости партнёров. Всё легально, так что насчёт сбора?",
        choices: [
          { text: "Ладно, диктуйте реквизиты.", next: "excited", stress: 10, suspicion: -10 },
          { text: "Пришлите официальное письмо с печатью организатора на почту.", next: "end_win", stress: -10, suspicion: 25 }
        ]},
      funny1: { text: "Автомобиль только целиком, деньгами не выдаём. Так что по поводу сбора?",
        choices: [
          { text: "Ладно, я передумал, машину не хочу — у меня и так велосипед есть.", next: "end_funny", stress: -5, suspicion: 10 },
          { text: "Хорошо, диктуйте реквизиты.", next: "excited", stress: 10, suspicion: -10 }
        ]},
      end_win: { ending: "win", title: "🎉 Ты не попался", story: "Ты запросил официальное письмо с печатью — на том конце повисла тишина, потом гудки.", tactic: "Схема «ложный выигрыш»: чтобы получить деньги, тебя просят сначала заплатить самому. Так не работает ни одна настоящая лотерея." },
      end_lose: { ending: "lose", title: "💸 Увы, тебя обманули", story: "Ты продиктовал номер карты и код с обратной стороны. Пришло смс о списании — приз, разумеется, не пришёл.", tactic: "Код CVV вместе с номером карты — всё, что нужно для оплаты в интернете. Его нельзя называть никому." },
      end_funny: { ending: "funny", title: "🤡 Эпичный провал мошенника", story: "Ты отказался от машины из-за отсутствия гаража. Собеседник явно не был готов к такому повороту и положил трубку.", tactic: "Абсурдная, но логичная реакция сбивает скрипт мошенника — у них есть заготовленные ответы только на «стандартные» реакции." }
    }
  },

  zvonok_3: {
    caller: { name: "Неизвестный номер", sub: "+7 902 111-22-33 · возможно, кто-то знакомый?", avatar: "??" },
    start: "start",
    nodes: {
      start: { text: "Алло... это я! (голос сорвался) Я в аварию попал, требуют деньги, не говори маме, пожалуйста!",
        choices: [
          { text: "Господи, ты в порядке?! Что случилось?!", next: "scared", stress: 15, suspicion: -5 },
          { text: "А с кем я вообще говорю? Представься полностью.", next: "suspicious", stress: 5, suspicion: 20 },
          { text: "Внучок, голос совсем как у другого человека.", next: "funny1", stress: -5, suspicion: 15 }
        ]},
      scared: { text: "Короче, нужно 60 000 срочно, иначе заявление подадут!",
        choices: [
          { text: "Хорошо, куда переводить?!", next: "end_lose", stress: 20, suspicion: -10 },
          { text: "Погоди, а почему ты не своим голосом говоришь? Перезвоню тебе на твой номер.", next: "end_win", stress: -10, suspicion: 25 }
        ]},
      suspicious: { text: "Мам, ну ты чего, это же я! Не время для вопросов, нужны деньги СЕЙЧАС!",
        choices: [
          { text: "Ладно-ладно, прости, что делать?", next: "scared", stress: 10, suspicion: -10 },
          { text: "Я тебе не «мама». Перезвоню сыну на его номер, подожди.", next: "end_win", stress: -10, suspicion: 25 }
        ]},
      funny1: { text: "Мам, ну хватит, серьёзно, тут авария, деньги нужны, а не экзамен по вопросам!",
        choices: [
          { text: "Ой божечки, ладно, а карту куда переводить, на Марс?", next: "end_funny", stress: -5, suspicion: 10 },
          { text: "Ладно, беспокоюсь, диктуй что нужно.", next: "scared", stress: 10, suspicion: -10 }
        ]},
      end_win: { ending: "win", title: "🎉 Ты не попался", story: "Ты положил трубку и перезвонил внуку на его настоящий номер — он спокойно смотрел сериал дома.", tactic: "Приём «родственник в беде» играет на панике и запрете «не говорить родителям». Прямая проверка разрушает схему за секунды." },
      end_lose: { ending: "lose", title: "💸 Увы, тебя обманули", story: "Ты, не раздумывая, перевела деньги «на аварию». Внук оказался жив-здоров.", tactic: "Запрет «не говори маме» — красный флаг: настоящая просьба о помощи не требует секретности от близких." },
      end_funny: { ending: "funny", title: "🤡 Эпичный провал мошенника", story: "Ты спросила, куда переводить — «на Марс». Повисла пауза, потом гудки.", tactic: "Абсурдный вопрос сбивает с толку — у мошенника есть скрипт только под «нормальные» реакции жертвы." }
    }
  }
};

const screens = {
  street: document.getElementById('screen-street'),
  incoming: document.getElementById('screen-incoming'),
  call: document.getElementById('screen-call'),
  ending: document.getElementById('screen-ending')
};
function showScreen(name) { Object.values(screens).forEach(s => s.classList.remove('active')); screens[name].classList.add('active'); }

let convKey = null, currentNode = "start";
let seconds = 0, timerHandle = null;
let stress = 20, suspicion = 20;
let lastKey = null;
let sessionStats = { calls: 0, win: 0, lose: 0, funny: 0 };

function pickRandomKey() {
  const keys = Object.keys(SCENARIOS);
  let key;
  do { key = keys[Math.floor(Math.random() * keys.length)]; } while (key === lastKey && keys.length > 1);
  lastKey = key;
  return key;
}

function buildBuildings() {
  const wrap = document.getElementById('buildings');
  const n = 8;
  for (let i = 0; i < n; i++) {
    const el = document.createElement('div');
    el.className = 'bld';
    el.style.width = (100 / n) + '%';
    el.style.height = (40 + Math.random() * 90) + 'px';
    el.style.background = i % 2 === 0 ? '#141a26' : '#10141e';
    wrap.appendChild(el);
  }
}
function updateStatsBar() {
  const bar = document.getElementById('statsBar');
  if (sessionStats.calls === 0) { bar.classList.remove('show'); return; }
  bar.textContent = `звонков: ${sessionStats.calls} · раскушено: ${sessionStats.win} · слито: ${sessionStats.lose} · провал мошенника: ${sessionStats.funny}`;
  bar.classList.add('show');
}
function startIdle() {
  const fab = document.getElementById('phoneFab');
  const hint = document.getElementById('hint');
  fab.classList.remove('show', 'ring');
  hint.classList.remove('show');
  updateStatsBar();
  setTimeout(() => {
    hint.classList.add('show');
    fab.classList.add('show');
    setTimeout(() => fab.classList.add('ring'), 300);
  }, 1200);
}
function ringAgain() {
  showScreen('street');
  updateStatsBar();
  const fab = document.getElementById('phoneFab');
  fab.classList.remove('ring');
  document.getElementById('hint').classList.add('show');
  void fab.offsetWidth;
  fab.classList.add('show');
  setTimeout(() => fab.classList.add('ring'), 500);
}

document.getElementById('phoneFab').addEventListener('click', () => startCall(pickRandomKey()));
document.getElementById('declineBtn').addEventListener('click', () => {
  showScreen('street');
  document.getElementById('declineMsg').classList.add('show');
  document.getElementById('phoneFab').classList.remove('show', 'ring');
  document.getElementById('hint').classList.remove('show');
});
document.getElementById('acceptBtn').addEventListener('click', beginCall);

function startCall(key) {
  convKey = key;
  const sc = SCENARIOS[key];
  document.getElementById('incomingAvatar').textContent = sc.caller.avatar;
  document.getElementById('incomingName').textContent = sc.caller.name;
  document.getElementById('incomingSub').textContent = sc.caller.sub;
  document.getElementById('callName').textContent = sc.caller.name;
  showScreen('incoming');
}

function beginCall() {
  showScreen('call');
  const sc = SCENARIOS[convKey];
  currentNode = sc.start;
  seconds = 0; stress = 20; suspicion = 20;
  updateMeters();
  document.getElementById('thread').innerHTML = '';
  clearInterval(timerHandle);
  timerHandle = setInterval(() => {
    seconds++;
    document.getElementById('callTimer').textContent =
      String(Math.floor(seconds / 60)).padStart(2, '0') + ':' + String(seconds % 60).padStart(2, '0');
  }, 1000);
  renderNode(true);
}

function updateMeters() {
  stress = Math.max(0, Math.min(100, stress));
  suspicion = Math.max(0, Math.min(100, suspicion));
  document.getElementById('stressFill').style.width = stress + '%';
  document.getElementById('stressVal').textContent = stress;
  document.getElementById('suspFill').style.width = suspicion + '%';
  document.getElementById('suspVal').textContent = suspicion;
}

function addBubble(text, who) {
  const thread = document.getElementById('thread');
  const b = document.createElement('div');
  b.className = 'bubble ' + who;
  b.textContent = text;
  thread.appendChild(b);
  thread.scrollTop = thread.scrollHeight;
}

function renderNode(first) {
  const sc = SCENARIOS[convKey];
  const node = sc.nodes[currentNode];
  const thread = document.getElementById('thread');
  const choicesWrap = document.getElementById('choices');
  choicesWrap.innerHTML = '';

  const showText = () => {
    addBubble(node.text, 'them');
    node.choices.forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice.text;
      btn.addEventListener('click', () => onChoose(choice));
      choicesWrap.appendChild(btn);
    });
  };

  if (first) {
    showText();
  } else {
    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';
    thread.appendChild(typing);
    thread.scrollTop = thread.scrollHeight;
    setTimeout(() => { typing.remove(); showText(); }, 700 + Math.random() * 400);
  }
}

function onChoose(choice) {
  document.getElementById('choices').innerHTML = '';
  addBubble(choice.text, 'me');
  stress += choice.stress || 0;
  suspicion += choice.suspicion || 0;
  updateMeters();

  const sc = SCENARIOS[convKey];
  const target = sc.nodes[choice.next];
  if (target.ending) {
    clearInterval(timerHandle);
    setTimeout(() => showEnding(target), 400);
  } else {
    currentNode = choice.next;
    setTimeout(() => renderNode(false), 250);
  }
}

function showEnding(ending) {
  document.getElementById('endTitle').textContent = ending.title;
  document.getElementById('endStory').textContent = ending.story;
  document.getElementById('endTactic').textContent = ending.tactic;
  const img = document.getElementById('endImage');
  img.style.display = 'none'; img.src = '';
  const stamp = document.getElementById('endStamp');
  stamp.className = 'stamp ' + ending.ending;
  stamp.textContent = ending.ending === 'win' ? 'РАСКУСИЛ' : ending.ending === 'lose' ? 'ОБМАНУТ' : 'ЭПИЧНЫЙ ПРОВАЛ МОШЕННИКА';

  sessionStats.calls++;
  sessionStats[ending.ending]++;

  const actions = document.getElementById('endActions');
  actions.innerHTML = '';
  const b1 = document.createElement('button');
  b1.className = 'retry-btn'; b1.textContent = 'Следующий звонок';
  b1.addEventListener('click', ringAgain);
  const b2 = document.createElement('button');
  b2.className = 'retry-btn ghost'; b2.textContent = 'Хватит на сегодня';
  b2.addEventListener('click', () => { showScreen('street'); startIdle(); });
  actions.appendChild(b1); actions.appendChild(b2);

  showScreen('ending');
}

buildBuildings();
startIdle();
</script>
</body>
</html>
