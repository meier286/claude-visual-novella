<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Голос в трубке</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

  :root{
    --bg-night:#0d1017;
    --bg-night-2:#161c28;
    --amber:#ffb84d;
    --bank-blue:#1c64f2;
    --bank-blue-dim:#12305e;
    --alert-red:#ff5c5c;
    --success-green:#41d68c;
    --gold:#f2c744;
    --cream:#f2ede3;
    --ink:#0b0d12;
    --font-display:'Oswald',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{margin:0; font-family:var(--font-body); background:var(--bg-night); color:var(--cream); overflow:hidden; height:100vh; width:100vw;}
  button{font-family:inherit; cursor:pointer;}
  button:focus-visible, .tap-target:focus-visible{outline:2px solid var(--amber); outline-offset:3px;}

  #app{position:relative; height:100vh; width:100vw; overflow:hidden;}

  .screen{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .4s ease;}
  .screen.active{opacity:1; pointer-events:auto;}

  /* ============ STREET ============ */
  #screen-street{
    background:radial-gradient(ellipse at 50% 18%, #2a3350 0%, transparent 55%), linear-gradient(180deg, var(--bg-night-2) 0%, var(--bg-night) 60%);
    flex-direction:column; justify-content:flex-end;
  }
  .street-topbar{position:absolute; top:16px; left:0; right:0; display:flex; justify-content:center; gap:10px; z-index:6;}
  .top-btn{background:rgba(22,28,40,.85); border:1px solid #2a3247; color:var(--cream); font-size:12px; padding:8px 14px; border-radius:20px; backdrop-filter:blur(4px);}
  .top-btn:hover{border-color:var(--amber);}
  .stats-bar{position:absolute; top:58px; left:0; right:0; text-align:center; font-family:var(--font-mono); font-size:11px; color:#7d859e; opacity:0; transition:opacity .5s ease;}
  .stats-bar.show{opacity:1;}
  .sky-title{position:absolute; top:26%; left:0; right:0; text-align:center; font-family:var(--font-display); letter-spacing:.12em; font-size:clamp(13px,3vw,16px); color:#8891ab; text-transform:uppercase; opacity:0; transition:opacity .6s ease;}
  .sky-title.show{opacity:1;}
  .buildings{position:absolute; bottom:0; left:0; right:0; height:38%; display:flex; align-items:flex-end;}
  .bld{background:#141a26; flex:none; border-top:2px solid #1c2333; position:relative;}
  .lamp{position:absolute; bottom:16%; left:20%; width:4px; height:32%; background:#20293c;}
  .lamp::before{content:''; position:absolute; top:-8px; left:-6px; width:16px; height:16px; border-radius:50%; background:var(--amber); box-shadow:0 0 40px 18px rgba(255,184,77,.35), 0 0 90px 50px rgba(255,184,77,.12);}
  .hero{position:absolute; bottom:16%; left:50%; transform:translateX(-50%); width:46px; height:110px; animation:idle 3.2s ease-in-out infinite;}
  @keyframes idle{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-4px);}}
  .hero .head{width:22px; height:22px; border-radius:50%; background:#3a4460; margin:0 auto;}
  .hero .body{width:38px; height:62px; margin:2px auto 0; background:#2c3450; border-radius:10px 10px 4px 4px;}
  .hero .legs{width:34px; height:22px; margin:0 auto; background:#1f2438; border-radius:0 0 6px 6px;}
  .street-hint{position:absolute; bottom:5%; left:0; right:0; text-align:center; font-size:13px; color:#6b7390; opacity:0; transition:opacity .5s ease;}
  .street-hint.show{opacity:1;}
  .decline-msg{position:absolute; bottom:14%; left:6%; right:6%; text-align:center; font-size:13px; color:#8891ab; opacity:0; transition:opacity .4s ease;}
  .decline-msg.show{opacity:1;}
  .phone-fab{position:absolute; bottom:8%; right:8%; width:64px; height:64px; border-radius:50%; background:var(--success-green); border:none; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(65,214,140,.35); opacity:0; transform:scale(.6); transition:opacity .4s ease, transform .4s ease;}
  .phone-fab.show{opacity:1; transform:scale(1);}
  .phone-fab.ring{animation:ringshake 1s ease-in-out infinite;}
  .phone-fab::after{content:''; position:absolute; inset:-14px; border-radius:50%; border:2px solid rgba(65,214,140,.5); animation:pulse-ring 1.6s ease-out infinite;}
  @keyframes pulse-ring{0%{transform:scale(.7); opacity:.9;}100%{transform:scale(1.9); opacity:0;}}
  @keyframes ringshake{0%,100%{transform:rotate(0);}20%{transform:rotate(-14deg);}40%{transform:rotate(12deg);}60%{transform:rotate(-8deg);}80%{transform:rotate(6deg);}}
  .phone-fab svg{width:26px;height:26px;fill:var(--ink);}

  /* ============ PHONE FRAME ============ */
  .phone-frame{width:min(360px, 90vw); height:min(680px, 88vh); background:linear-gradient(180deg,#161c28,#0f1420); border-radius:38px; border:6px solid #05070c; box-shadow:0 30px 70px rgba(0,0,0,.6); position:relative; display:flex; flex-direction:column; overflow:hidden;}
  .notch{position:absolute; top:0; left:50%; transform:translateX(-50%); width:120px; height:22px; background:#05070c; border-radius:0 0 16px 16px; z-index:5;}

  #screen-incoming .phone-frame{align-items:center; justify-content:space-between; padding:64px 26px 40px; background:radial-gradient(circle at 50% 30%, #1a2236 0%, #0e1320 70%);}
  .caller-block{text-align:center;}
  .caller-avatar{width:96px; height:96px; border-radius:50%; margin:0 auto 18px; background:linear-gradient(145deg, var(--bank-blue), var(--bank-blue-dim)); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:30px; position:relative; overflow:hidden;}
  .caller-avatar img{width:100%; height:100%; object-fit:cover;}
  .caller-avatar::after{content:''; position:absolute; inset:-14px; border-radius:50%; border:2px solid rgba(28,100,242,.4); animation:pulse-ring 1.8s ease-out infinite;}
  .caller-name{font-family:var(--font-display); font-size:22px; margin:0 0 6px;}
  .caller-badge{display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--bank-blue); background:rgba(28,100,242,.12); border:1px solid rgba(28,100,242,.3); padding:3px 9px; border-radius:20px; margin-bottom:10px;}
  .caller-sub{font-size:13px; color:#7d859e; font-family:var(--font-mono);}
  .incoming-actions{display:flex; justify-content:space-between; width:100%; padding:0 14px;}
  .call-btn{width:60px; height:60px; border-radius:50%; border:none; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 20px rgba(0,0,0,.4);}
  .call-btn.decline{background:var(--alert-red);}
  .call-btn.accept{background:var(--success-green); animation:pulse-btn 1.4s ease-in-out infinite;}
  @keyframes pulse-btn{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
  .call-btn svg{width:24px;height:24px;fill:var(--ink);}
  .call-btn-label{font-size:11px; text-align:center; margin-top:8px; color:#8891ab;}

  #screen-call .phone-frame{padding-top:52px;}
  .call-top{text-align:center; padding:0 20px 10px; flex:none;}
  .call-top .caller-name{font-size:17px; margin-bottom:2px;}
  .call-timer{font-family:var(--font-mono); font-size:12px; color:var(--success-green);}
  .meters{margin:8px 20px 4px; flex:none; display:flex; flex-direction:column; gap:8px;}
  .meter-label{display:flex; justify-content:space-between; font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:#7d859e; margin-bottom:4px;}
  .meter-label span.val{font-family:var(--font-mono); color:var(--cream);}
  .meter-track{height:6px; border-radius:4px; background:#232a3c; overflow:hidden;}
  .meter-fill{height:100%; border-radius:4px; transition:width .5s ease;}
  .meter-fill.stress{background:linear-gradient(90deg,#6b2f2f,var(--alert-red));}
  .meter-fill.suspicion{background:linear-gradient(90deg,#215a44,var(--success-green));}

  .thread{flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:10px; scrollbar-width:thin;}
  .bubble{max-width:82%; padding:10px 13px; border-radius:14px; font-size:14px; line-height:1.4; opacity:0; transform:translateY(6px); animation:bubble-in .35s ease forwards;}
  @keyframes bubble-in{to{opacity:1; transform:translateY(0);}}
  .bubble.them{align-self:flex-start; background:var(--bank-blue-dim); border:1px solid rgba(28,100,242,.35); border-bottom-left-radius:4px;}
  .bubble.me{align-self:flex-end; background:#232b3f; border:1px solid #323c56; border-bottom-right-radius:4px; color:var(--cream);}
  .typing{align-self:flex-start; display:flex; gap:4px; padding:12px 15px; background:var(--bank-blue-dim); border:1px solid rgba(28,100,242,.35); border-radius:14px; border-bottom-left-radius:4px;}
  .typing span{width:6px; height:6px; border-radius:50%; background:#7fa4f7; animation:blink 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;} .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.25;}40%{opacity:1;}}
  .choices{flex:none; padding:10px 14px 18px; display:flex; flex-direction:column; gap:8px; border-top:1px solid #1e2536;}
  .choice-btn{text-align:left; background:#1a2033; border:1px solid #2a3247; color:var(--cream); padding:10px 13px; border-radius:12px; font-size:13.5px; line-height:1.35; transition:background .15s ease, border-color .15s ease, transform .1s ease;}
  .choice-btn:hover{background:#232b45; border-color:var(--amber);}
  .choice-btn:active{transform:scale(.98);}

  /* ============ ENDING ============ */
  #screen-ending{padding:20px;}
  .report-card{width:min(380px, 92vw); max-height:90vh; overflow-y:auto; background:var(--cream); color:var(--ink); border-radius:6px; padding:26px 26px 24px; position:relative; box-shadow:0 30px 60px rgba(0,0,0,.5);}
  .report-card::before{content:'ОТЧЁТ О ЗВОНКЕ'; position:absolute; top:-11px; left:24px; background:var(--ink); color:var(--cream); font-family:var(--font-mono); font-size:10px; letter-spacing:.1em; padding:3px 10px;}
  .report-title{font-family:var(--font-display); font-size:23px; margin:10px 0 12px;}
  #endImage{display:none; width:100%; max-height:180px; object-fit:cover; border-radius:4px; margin-bottom:14px;}
  .report-story{font-size:14px; line-height:1.55; margin-bottom:16px; color:#2a2f3a;}
  .report-tactic{font-size:13px; line-height:1.5; padding:12px 14px; background:#e7e1d2; border-left:3px solid var(--bank-blue); margin-bottom:20px; color:#2a2f3a;}
  .report-tactic b{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; color:var(--bank-blue);}
  .stamp{display:inline-block; font-family:var(--font-display); font-size:15px; letter-spacing:.06em; padding:8px 16px; border:3px solid currentColor; border-radius:4px; transform:rotate(-4deg); margin-bottom:18px;}
  .stamp.win{color:var(--success-green);} .stamp.lose{color:var(--alert-red);} .stamp.funny{color:#c99a12;}
  #endActions{display:flex; flex-direction:column; gap:8px;}
  .retry-btn{display:block; width:100%; border:none; padding:13px; background:var(--ink); color:var(--cream); font-family:var(--font-display); font-size:14px; letter-spacing:.04em; border-radius:5px;}
  .retry-btn.ghost{background:transparent; color:var(--ink); border:1px solid var(--ink);}

  /* ============ LIBRARY / EDITOR ============ */
  #screen-library, #screen-editor{align-items:flex-start; padding-top:4vh;}
  .panel{width:min(640px,94vw); max-height:92vh; overflow-y:auto; background:#12161f; border:1px solid #232b3f; border-radius:10px; padding:22px 20px 30px;}
  .panel-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; gap:10px; flex-wrap:wrap;}
  .panel-title{font-family:var(--font-display); font-size:19px; letter-spacing:.03em;}
  .icon-btn{background:none; border:1px solid #2a3247; color:var(--cream); border-radius:8px; padding:7px 12px; font-size:12.5px;}
  .icon-btn:hover{border-color:var(--amber);}
  .panel-actions{display:flex; gap:8px; flex-wrap:wrap;}

  .scenario-card{background:var(--cream); color:var(--ink); border-radius:6px; padding:14px 15px; margin-bottom:12px; display:flex; gap:12px; align-items:flex-start; box-shadow:0 6px 16px rgba(0,0,0,.3);}
  .avatar-sm{width:44px;height:44px;border-radius:50%;background:var(--bank-blue);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-display);flex:none;overflow:hidden; font-size:14px;}
  .avatar-sm img{width:100%;height:100%;object-fit:cover;}
  .sc-body{flex:1; min-width:0;}
  .sc-body h4{margin:0 0 4px; font-family:var(--font-display); font-size:15px;}
  .sc-body p{margin:0 0 10px; font-size:12.5px; color:#4a4f5c; line-height:1.4;}
  .sc-actions{display:flex; flex-wrap:wrap; gap:6px;}
  .sc-actions button{font-size:11.5px; padding:5px 10px; border-radius:14px; border:1px solid #cfc7b3; background:#e7e1d2; color:var(--ink);}
  .sc-actions button.primary{background:var(--ink); color:var(--cream); border-color:var(--ink);}
  .sc-actions button.danger{border-color:#e08a8a; color:#a33;}
  .empty-note{color:#7d859e; font-size:13px; padding:20px 0;}

  .form-row{margin-bottom:12px;}
  .form-row label{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:#7d859e; margin-bottom:5px;}
  .form-row input[type=text], .form-row input[type=url], .form-row input[type=number], .form-row textarea, .form-row select{
    width:100%; background:#1a2033; border:1px solid #2a3247; color:var(--cream); padding:9px 11px; border-radius:6px; font-family:var(--font-body); font-size:13.5px;
  }
  .form-row textarea{resize:vertical; min-height:56px;}
  .two-col{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .section-label{font-family:var(--font-display); font-size:14px; letter-spacing:.03em; color:var(--amber); margin:20px 0 10px; padding-top:14px; border-top:1px solid #232b3f;}

  .node-card{border:1px solid #2a3247; border-left:4px solid var(--bank-blue); border-radius:8px; padding:14px; margin-bottom:14px; background:#161c28;}
  .node-card.ending-win{border-left-color:var(--success-green);}
  .node-card.ending-lose{border-left-color:var(--alert-red);}
  .node-card.ending-funny{border-left-color:var(--gold);}
  .node-card-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:8px; flex-wrap:wrap;}
  .node-id-badge{font-family:var(--font-mono); font-size:11px; color:#7d859e; background:#0d1017; padding:2px 8px; border-radius:10px;}
  .choice-block{border-top:1px dashed #2a3247; padding-top:10px; margin-top:10px;}
  .choice-block-title{font-size:11px; color:#7d859e; margin-bottom:6px;}
  .mini-row{display:flex; gap:8px;}
  .mini-row .form-row{flex:1; margin-bottom:0;}

  .btn-row{display:flex; gap:8px; flex-wrap:wrap; margin-top:18px;}
  .btn{padding:10px 16px; border-radius:8px; border:1px solid #2a3247; background:#1a2033; color:var(--cream); font-size:13px;}
  .btn.primary{background:var(--success-green); color:var(--ink); border-color:var(--success-green); font-weight:600;}
  .btn.secondary{background:transparent;}
  .btn.danger{border-color:var(--alert-red); color:var(--alert-red);}
  .hint-text{font-size:12px; color:#7d859e; margin:-4px 0 14px; line-height:1.5;}
</style>
</head>
<body>
<div id="app">

  <!-- STREET -->
  <div id="screen-street" class="screen active">
    <div class="street-topbar">
      <button class="top-btn" id="btnOpenLibrary">📁 Сценарии</button>
      <button class="top-btn" id="btnOpenEditor">✎ Создать сценарий</button>
    </div>
    <div class="stats-bar" id="statsBar"></div>
    <div class="sky-title" id="skyTitle">поздний вечер · где-то во дворах</div>
    <div class="buildings" id="buildings"></div>
    <div class="lamp"></div>
    <div class="hero"><div class="head"></div><div class="body"></div><div class="legs"></div></div>
    <div class="street-hint" id="streetHint">телефон завибрировал в кармане…</div>
    <div class="decline-msg" id="declineMsg"></div>
    <button class="phone-fab" id="phoneFab" aria-label="Ответить на звонок">
      <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.4 0 .8-.2 1L6.6 10.8z"/></svg>
    </button>
  </div>

  <!-- INCOMING -->
  <div id="screen-incoming" class="screen">
    <div class="phone-frame">
      <div class="notch"></div>
      <div class="caller-block">
        <div class="caller-avatar" id="incomingAvatar">СБ</div>
        <div class="caller-badge" id="incomingBadge">⚠ незнакомый номер</div>
        <div class="caller-name" id="incomingName">Служба Безопасности Банка</div>
        <div class="caller-sub" id="incomingSub">+7 900 XXX-XX-XX</div>
      </div>
      <div class="incoming-actions">
        <div><button class="call-btn decline" id="btnDecline" aria-label="Отклонить"><svg viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.1.3-4.5.8-.4.2-.9.1-1.2-.2l-2-2c-.4-.4-.4-1 0-1.4C6.9 3.9 9.4 3 12 3s5.1.9 7.7 3.2c.4.4.4 1 0 1.4l-2 2c-.3.3-.8.4-1.2.2C15.1 9.3 13.6 9 12 9z" transform="rotate(180 12 12)"/></svg></button><div class="call-btn-label">Отклонить</div></div>
        <div><button class="call-btn accept" id="btnAccept" aria-label="Ответить"><svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.4 0 .8-.2 1L6.6 10.8z"/></svg></button><div class="call-btn-label">Ответить</div></div>
      </div>
    </div>
  </div>

  <!-- IN CALL -->
  <div id="screen-call" class="screen">
    <div class="phone-frame">
      <div class="notch"></div>
      <div class="call-top">
        <div class="caller-name" id="callName">Служба Безопасности Банка</div>
        <div class="call-timer" id="callTimer">00:00</div>
      </div>
      <div class="meters">
        <div>
          <div class="meter-label"><span>Стресс</span><span class="val" id="stressVal">20</span></div>
          <div class="meter-track"><div class="meter-fill stress" id="stressFill" style="width:20%"></div></div>
        </div>
        <div>
          <div class="meter-label"><span>Бдительность</span><span class="val" id="suspVal">20</span></div>
          <div class="meter-track"><div class="meter-fill suspicion" id="suspFill" style="width:20%"></div></div>
        </div>
      </div>
      <div class="thread" id="thread"></div>
      <div class="choices" id="choices"></div>
    </div>
  </div>

  <!-- ENDING -->
  <div id="screen-ending" class="screen">
    <div class="report-card">
      <div class="stamp" id="endStamp">РАСКУСИЛ</div>
      <img id="endImage" alt="">
      <div class="report-title" id="endTitle">Ты не попался</div>
      <div class="report-story" id="endStory">...</div>
      <div class="report-tactic"><b>Приём мошенника</b><span id="endTactic">...</span></div>
      <div id="endActions"></div>
    </div>
  </div>

  <!-- LIBRARY -->
  <div id="screen-library" class="screen">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">📁 Сценарии звонков</div>
        <div class="panel-actions">
          <button class="icon-btn" id="btnImport">⬆ Импорт JSON</button>
          <input type="file" id="importInput" accept=".json,application/json" multiple style="display:none">
          <button class="icon-btn" id="btnNewFromLibrary">+ Создать</button>
          <button class="icon-btn" id="btnLibraryBack">← Улица</button>
        </div>
      </div>
      <div id="libraryList"></div>
    </div>
  </div>

  <!-- EDITOR -->
  <div id="screen-editor" class="screen">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">✎ Конструктор сценария</div>
        <button class="icon-btn" id="btnEditorBack">← Библиотека</button>
      </div>
      <div id="editorBody"></div>
    </div>
  </div>

</div>

<script>
/* ============================================================
   ДВИЖОК
   Каждый сценарий — как отдельная "папка": caller (профиль
   звонящего) + nodes (узлы-реплики и узлы-финалы) + start.
   Встроенные сценарии ниже можно скачать (⬇ Экспорт) как
   настоящие .json файлы и открыть в текстовом редакторе —
   структура ровно такая же, какую строит конструктор.
   ============================================================ */

const screens = {
  street: document.getElementById('screen-street'),
  incoming: document.getElementById('screen-incoming'),
  call: document.getElementById('screen-call'),
  ending: document.getElementById('screen-ending'),
  library: document.getElementById('screen-library'),
  editor: document.getElementById('screen-editor')
};
function showScreen(name){ Object.values(screens).forEach(s=>s.classList.remove('active')); screens[name].classList.add('active'); }
function backToStreet(){ showScreen('street'); }

let state = { convKey:null, node:null, stress:20, suspicion:20, seconds:0, timerHandle:null, testMode:false };
let sessionStats = { calls:0, win:0, lose:0, funny:0 };
let lastPlayedKey = null;
let TEST_SCENARIO = null;

function getScenario(key){ return key === '__test__' ? TEST_SCENARIO : SCENARIOS[key]; }

function pickRandomScenarioKey(){
  const keys = Object.keys(SCENARIOS).filter(k => !SCENARIOS[k].hidden);
  if(keys.length === 1) return keys[0];
  let key;
  do{ key = keys[Math.floor(Math.random()*keys.length)]; } while(key === lastPlayedKey && keys.length > 1);
  lastPlayedKey = key;
  return key;
}

function escapeHtml(str){ return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ---- street ---- */
function buildBuildings(){
  const wrap = document.getElementById('buildings'); wrap.innerHTML = '';
  const n = 9;
  for(let i=0;i<n;i++){
    const el = document.createElement('div');
    const h = 40 + Math.random()*100;
    el.className = 'bld'; el.style.width = (100/n)+'%'; el.style.height = h+'px';
    el.style.background = i % 2 === 0 ? '#141a26' : '#10141e';
    wrap.appendChild(el);
    const winCount = Math.floor(Math.random()*4);
    for(let w=0; w<winCount; w++){
      const win = document.createElement('span');
      win.style.position='absolute'; win.style.left=(Math.random()*70+10)+'%'; win.style.bottom=(Math.random()*(h-20)+8)+'px';
      win.style.width='6px'; win.style.height='8px'; win.style.background='#ffcf7a'; win.style.opacity='.5';
      el.appendChild(win);
    }
  }
}
function updateStatsBar(){
  const bar = document.getElementById('statsBar');
  if(sessionStats.calls === 0){ bar.classList.remove('show'); return; }
  bar.textContent = `звонков: ${sessionStats.calls} · раскушено: ${sessionStats.win} · слито: ${sessionStats.lose} · провал мошенника: ${sessionStats.funny}`;
  bar.classList.add('show');
}
function resetStreet(){
  document.getElementById('declineMsg').classList.remove('show');
  const fab = document.getElementById('phoneFab');
  fab.classList.remove('show','ring');
  document.getElementById('skyTitle').classList.remove('show');
  document.getElementById('streetHint').classList.remove('show');

    document.getElementById('streetHint').classList.add('show');

function ringAgain(){

function startConversation(key){
  state.convKey = key;
  const sc = getScenario(key);
  document.getElementById('incomingAvatar').innerHTML = sc.caller.avatarImage ? `<img src="${escapeHtml(sc.caller.avatarImage)}" alt="">` : escapeHtml(sc.caller.avatar || '??');
  document.getElementById('incomingName').textContent = sc.caller.name;
  document.getElementById('incomingSub').textContent = sc.caller.sub;
  document.getElementById('incomingBadge').textContent = sc.caller.badge || '⚠ незнакомый номер';
  document.getElementById('callName').textContent = sc.caller.name;
  showScreen('incoming');
}

function beginCall(){
  const sc = getScenario(state.convKey);
  state.node = sc.start;
  state.stress = 20; state.suspicion = 20; state.seconds = 0;
  document.getElementById('thread').innerHTML = '';
  updateMeters();
  showScreen('call');
  clearInterval(state.timerHandle);
  state.timerHandle = setInterval(()=>{
    state.seconds++;
    document.getElementById('callTimer').textContent = String(Math.floor(state.seconds/60)).padStart(2,'0')+':'+String(state.seconds%60).padStart(2,'0');
  }, 1000);
  renderNode(true);
}

function updateMeters(){
  const s = Math.max(0, Math.min(100, state.stress));
  const v = Math.max(0, Math.min(100, state.suspicion));
  document.getElementById('stressFill').style.width = s+'%';
  document.getElementById('stressVal').textContent = s;
  document.getElementById('suspFill').style.width = v+'%';
  document.getElementById('suspVal').textContent = v;
}

function addBubble(text, who){
  const thread = document.getElementById('thread');
  const b = document.createElement('div'); b.className = 'bubble ' + who; b.textContent = text;
  thread.appendChild(b); thread.scrollTop = thread.scrollHeight;
}

function renderNode(first){
  const sc = getScenario(state.convKey);
  const node = sc.nodes[state.node];
  if(node.ending){ clearInterval(state.timerHandle); renderEnding(node); return; }

  const thread = document.getElementById('thread');
  const choicesWrap = document.getElementById('choices');
  choicesWrap.innerHTML = '';

  const showText = () => {
    addBubble(node.text, 'them');
    node.choices.forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn'; btn.textContent = choice.text;
      btn.addEventListener('click', () => onChoose(choice));
      choicesWrap.appendChild(btn);
    });
  };

  if(first){ showText(); }
  else {
    const typing = document.createElement('div');
    typing.className = 'typing'; typing.innerHTML = '<span></span><span></span><span></span>';
    thread.appendChild(typing); thread.scrollTop = thread.scrollHeight;
    setTimeout(()=>{ typing.remove(); showText(); }, 700 + Math.random()*400);
  }
}

function onChoose(choice){
  document.getElementById('choices').innerHTML = '';
  addBubble(choice.text, 'me');
  state.stress = Math.max(0, Math.min(100, state.stress + (choice.stress||0)));
  state.suspicion = Math.max(0, Math.min(100, state.suspicion + (choice.suspicion||0)));
  updateMeters();

  const sc = getScenario(state.convKey);
  if(state.stress >= 100){
    const auto = sc.autoLose || FALLBACK_AUTO_LOSE;
    setTimeout(()=>{ clearInterval(state.timerHandle); renderEnding({ ending:'lose', title:auto.title, story:auto.story, tactic:auto.tactic }); }, 250);
    return;
  }
  state.node = choice.next;
  setTimeout(()=> renderNode(false), 250);
}

function renderEnding(node){
  document.getElementById('endTitle').textContent = node.title;
  document.getElementById('endStory').textContent = node.story;
  document.getElementById('endTactic').textContent = node.tactic;
  const img = document.getElementById('endImage');
  if(node.image){ img.src = node.image; img.style.display = 'block'; } else { img.style.display = 'none'; img.src=''; }
  const stamp = document.getElementById('endStamp');
  stamp.className = 'stamp ' + node.ending;
  stamp.textContent = node.ending === 'win' ? 'РАСКУСИЛ' : node.ending === 'lose' ? 'ОБМАНУТ' : 'ЭПИЧНЫЙ ПРОВАЛ МОШЕННИКА';

  if(!state.testMode){
    sessionStats.calls++;
    sessionStats[node.ending]++;
  }

  const actions = document.getElementById('endActions');
  actions.innerHTML = '';
  if(state.testMode){
    const b = document.createElement('button');
    b.className = 'retry-btn'; b.textContent = '← Вернуться в редактор';
    b.addEventListener('click', () => { state.testMode = false; showScreen('editor'); });
    actions.appendChild(b);
  } else {
    const b1 = document.createElement('button');
    b1.className = 'retry-btn'; b1.textContent = 'Следующий звонок';
    b1.addEventListener('click', ringAgain);
    const b2 = document.createElement('button');
    b2.className = 'retry-btn ghost'; b2.textContent = 'Хватит на сегодня';
    b2.addEventListener('click', resetStreet);
    actions.appendChild(b1); actions.appendChild(b2);
  }
  showScreen('ending');
}

function openLibrary(){ showScreen('library'); renderLibrary(); }

function renderLibrary(){
  const wrap = document.getElementById('libraryList');
  wrap.innerHTML = '';
  const list = Object.values(SCENARIOS).filter(sc => !sc.hidden);
  if(list.length === 0){ wrap.innerHTML = '<div class="empty-note">Пока пусто. Создай свой первый сценарий.</div>'; return; }
  list.forEach(sc => {
    const card = document.createElement('div');
    card.className = 'scenario-card';
    card.innerHTML = `
      <div class="avatar-sm">${sc.caller.avatarImage ? `<img src="${escapeHtml(sc.caller.avatarImage)}" alt="">` : escapeHtml(sc.caller.avatar||'??')}</div>
      <div class="sc-body">
        <h4>${escapeHtml(sc.caller.name)}${sc.builtin ? ' <span style="font-weight:400;color:#8a8060;">· встроенный</span>' : ''}</h4>
        <p>${escapeHtml(sc.description || 'Без описания.')}</p>
        <div class="sc-actions">
          <button class="primary" data-act="play">▶ Играть</button>
          <button data-act="edit">✎ Изменить (копия)</button>
          <button data-act="export">⬇ Экспорт JSON</button>
          ${sc.builtin ? '' : '<button class="danger" data-act="delete">🗑 Удалить</button>'}
        </div>
      </div>`;
    card.querySelector('[data-act="play"]').addEventListener('click', () => startConversation(sc.id));
    card.querySelector('[data-act="edit"]').addEventListener('click', () => openEditor(sc));
    card.querySelector('[data-act="export"]').addEventListener('click', () => exportScenario(sc.id));
    const delBtn = card.querySelector('[data-act="delete"]');
    if(delBtn) delBtn.addEventListener('click', () => {
      if(confirm(`Удалить сценарий «${sc.caller.name}»? Это необратимо (если не экспортировал JSON).`)){
        delete SCENARIOS[sc.id]; renderLibrary();
      }
    });
    wrap.appendChild(card);
  });
}

function exportScenario(id){
  const sc = SCENARIOS[id];
  const data = JSON.stringify(sc, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = id + '.json'; a.click();
  URL.revokeObjectURL(url);
}

function handleImportFiles(e){
  const files = Array.from(e.target.files || []);
  let okCount = 0, failCount = 0;
  const readNext = (i) => {
    if(i >= files.length){
      renderLibrary();
      if(okCount) alert(`Импортировано сценариев: ${okCount}` + (failCount ? `, не удалось: ${failCount}` : ''));
      else if(failCount) alert('Не удалось прочитать ни одного файла — проверь, что это корректный JSON сценария.');
      e.target.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const parsed = JSON.parse(reader.result);
        if(!parsed.caller || !parsed.nodes || !parsed.start) throw new Error('bad shape');
        parsed.id = parsed.id && !SCENARIOS[parsed.id] ? parsed.id : 'custom_' + Date.now() + '_' + i;
        parsed.builtin = false;
        SCENARIOS[parsed.id] = parsed;
        okCount++;
      } catch(err){ failCount++; }
      readNext(i+1);
    };
    reader.onerror = () => { failCount++; readNext(i+1); };
    reader.readAsText(files[i]);
  };
  readNext(0);
}

let editorScenario = null;

function createBlankChoice(){ return {text:'', target:'', stress:0, suspicion:0}; }
function createBlankMessageNode(id){ return {id, type:'message', text:'', choices:[createBlankChoice(),createBlankChoice(),createBlankChoice()]}; }
function createBlankEndingNode(id){ return {id, type:'ending', endingType:'win', title:'', story:'', tactic:'', image:''}; }

function openEditor(source){
  if(source){
    const clone = JSON.parse(JSON.stringify(source));
    const nodesArr = Object.keys(clone.nodes).map(id => {
      const n = clone.nodes[id];
      return n.ending
        ? {id, type:'ending', endingType:n.ending, title:n.title||'', story:n.story||'', tactic:n.tactic||'', image:n.image||''}
        : {id, type:'message', text:n.text||'', choices:(n.choices||[]).map(c=>({text:c.text||'', target:c.next||'', stress:c.stress||0, suspicion:c.suspicion||0}))};
    });
    editorScenario = {
      id: 'custom_' + Date.now(),
      description: clone.description || '',
      caller: { name:clone.caller.name||'', sub:clone.caller.sub||'', avatar:clone.caller.avatar||'??', avatarImage:clone.caller.avatarImage||'', badge:clone.caller.badge||'' },
      start: clone.start || (nodesArr[0] ? nodesArr[0].id : ''),
      nodes: nodesArr,
      autoLose: clone.autoLose ? {...clone.autoLose} : {title:'', story:'', tactic:''},
      counter: nodesArr.length + 1
    };
  } else {
    editorScenario = {
      id: 'custom_' + Date.now(),
      description: '',
      caller: { name:'', sub:'', avatar:'??', avatarImage:'', badge:'' },
      start: 'n1',
      nodes: [createBlankMessageNode('n1')],
      autoLose: {title:'', story:'', tactic:''},
      counter: 2
    };
  }
  showScreen('editor');
  renderEditor();
}

function targetOptionsHtml(currentTarget, excludeId){
  let html = `<option value="">— выбери узел —</option>`;
  editorScenario.nodes.forEach(n => {
    if(n.id === excludeId) return;
    const label = n.type === 'ending' ? `[финал] ${n.title || n.id}` : `${n.id}: ${(n.text||'(пусто)').slice(0,26)}`;
    html += `<option value="${n.id}" ${n.id === currentTarget ? 'selected' : ''}>${escapeHtml(label)}</option>`;
  });
  html += `<option value="__new__">+ Новый узел</option>`;
  return html;
}

function nodeCardHtml(n){
  if(n.type === 'ending'){
    return `
      <div class="node-card ending-${n.endingType}" data-node="${n.id}">
        <div class="node-card-head">
          <span class="node-id-badge">${n.id} · финал</span>
          <div style="display:flex; gap:6px;">
            <select class="node-type-select" data-node="${n.id}">
              <option value="message">Реплика</option>
              <option value="ending" selected>Финал</option>
            </select>
            <button class="btn danger" data-remove="${n.id}">Удалить</button>
          </div>
        </div>
        <div class="form-row"><label>Тип финала</label>
          <select class="f-endtype" data-node="${n.id}">
            <option value="win" ${n.endingType==='win'?'selected':''}>Победа (раскусил)</option>
            <option value="lose" ${n.endingType==='lose'?'selected':''}>Проигрыш (обманут)</option>
            <option value="funny" ${n.endingType==='funny'?'selected':''}>Смешной провал мошенника</option>
          </select>
        </div>
        <div class="form-row"><label>Заголовок</label><input type="text" class="f-title" data-node="${n.id}" value="${escapeHtml(n.title)}" placeholder="🎉 Ты не попался"></div>
        <div class="form-row"><label>История (что произошло)</label><textarea class="f-story" data-node="${n.id}" placeholder="Опиши, чем закончился звонок...">${escapeHtml(n.story)}</textarea></div>
        <div class="form-row"><label>Приём мошенника (объяснение)</label><textarea class="f-tactic" data-node="${n.id}" placeholder="Какой реальный приём был показан...">${escapeHtml(n.tactic)}</textarea></div>
        <div class="form-row"><label>Картинка (необязательно, ссылка)</label><input type="url" class="f-image" data-node="${n.id}" value="${escapeHtml(n.image)}" placeholder="https://..."></div>
      </div>`;
  }
  const choicesHtml = n.choices.map((c, idx) => `
    <div class="choice-block">
      <div class="choice-block-title">Вариант ответа ${idx+1}</div>
      <div class="form-row"><input type="text" class="f-choice-text" data-node="${n.id}" data-idx="${idx}" value="${escapeHtml(c.text)}" placeholder="Текст реплики игрока"></div>
      <div class="form-row"><label>Куда ведёт</label><select class="f-choice-target" data-node="${n.id}" data-idx="${idx}">${targetOptionsHtml(c.target, n.id)}</select></div>
      <div class="mini-row">
        <div class="form-row"><label>Δ Стресс</label><input type="number" class="f-choice-stress" data-node="${n.id}" data-idx="${idx}" value="${c.stress}" step="5"></div>
        <div class="form-row"><label>Δ Бдительность</label><input type="number" class="f-choice-suspicion" data-node="${n.id}" data-idx="${idx}" value="${c.suspicion}" step="5"></div>
      </div>
    </div>`).join('');
  return `
    <div class="node-card" data-node="${n.id}">
      <div class="node-card-head">
        <span class="node-id-badge">${n.id} · реплика</span>
        <div style="display:flex; gap:6px;">
          <select class="node-type-select" data-node="${n.id}">
            <option value="message" selected>Реплика</option>
            <option value="ending">Финал</option>
          </select>
          <button class="btn danger" data-remove="${n.id}">Удалить</button>
        </div>
      </div>
      <div class="form-row"><label>Текст мошенника</label><textarea class="f-text" data-node="${n.id}" placeholder="Что говорит звонящий на этом шаге...">${escapeHtml(n.text)}</textarea></div>
      ${choicesHtml}
    </div>`;
}

function renderEditor(){
  const body = document.getElementById('editorBody');
  const startOptions = editorScenario.nodes.map(n => `<option value="${n.id}" ${n.id===editorScenario.start?'selected':''}>${n.id}${n.type==='ending'?' (финал)':''}</option>`).join('');

  body.innerHTML = `
    <div class="hint-text">Настрой профиль звонящего, добавь реплики и финалы. Выбирая «куда ведёт» ответ, можно сразу создать новый узел — так дерево строится по ходу дела.</div>

    <div class="section-label" style="margin-top:0; padding-top:0; border-top:none;">Профиль звонящего</div>
    <div class="two-col">
      <div class="form-row"><label>Имя / кем представляется</label><input type="text" id="f-caller-name" value="${escapeHtml(editorScenario.caller.name)}" placeholder="Служба Безопасности Банка"></div>
      <div class="form-row"><label>Подпись под именем</label><input type="text" id="f-caller-sub" value="${escapeHtml(editorScenario.caller.sub)}" placeholder="+7 900 ХХХ-ХХ-ХХ · номер не в контактах"></div>
    </div>
    <div class="two-col">
      <div class="form-row"><label>Инициалы аватара (2 буквы)</label><input type="text" id="f-caller-avatar" maxlength="2" value="${escapeHtml(editorScenario.caller.avatar)}" placeholder="СБ"></div>
      <div class="form-row"><label>Или картинка аватара (ссылка)</label><input type="url" id="f-caller-avatarimg" value="${escapeHtml(editorScenario.caller.avatarImage)}" placeholder="https://..."></div>
    </div>
    <div class="form-row"><label>Бейдж на экране входящего звонка</label><input type="text" id="f-caller-badge" value="${escapeHtml(editorScenario.caller.badge)}" placeholder="✓ похоже на банк"></div>
    <div class="form-row"><label>Описание для библиотеки</label><input type="text" id="f-description" value="${escapeHtml(editorScenario.description)}" placeholder="Одна строка о сюжете звонка"></div>

    <div class="section-label">Стартовый узел</div>
    <div class="form-row"><select id="f-start">${startOptions}</select></div>

    <div class="section-label">Узлы разговора (${editorScenario.nodes.length})</div>
    <div id="nodesWrap">${editorScenario.nodes.map(nodeCardHtml).join('')}</div>
    <div class="btn-row"><button class="btn" id="btnAddNode">+ Добавить узел</button></div>

    <div class="section-label">Если стресс достигнет 100 (необязательно)</div>
    <div class="hint-text">Если оставить пустым — сработает стандартный текст про панику.</div>
    <div class="form-row"><label>Заголовок</label><input type="text" id="f-autolose-title" value="${escapeHtml(editorScenario.autoLose.title)}" placeholder="😵 Не выдержал"></div>
    <div class="form-row"><label>История</label><textarea id="f-autolose-story">${escapeHtml(editorScenario.autoLose.story)}</textarea></div>
    <div class="form-row"><label>Приём мошенника</label><textarea id="f-autolose-tactic">${escapeHtml(editorScenario.autoLose.tactic)}</textarea></div>

    <div class="btn-row">
      <button class="btn primary" id="btnSaveScenario">💾 Сохранить в библиотеку</button>
      <button class="btn" id="btnTestScenario">▶ Тест-прогон</button>
      <button class="btn" id="btnExportScenario">⬇ Экспорт JSON</button>
      <button class="btn secondary" id="btnCancelEditor">Отмена</button>
    </div>
  `;

  // caller/meta bindings
  document.getElementById('f-caller-name').oninput = e => editorScenario.caller.name = e.target.value;
  document.getElementById('f-caller-sub').oninput = e => editorScenario.caller.sub = e.target.value;
  document.getElementById('f-caller-avatar').oninput = e => editorScenario.caller.avatar = e.target.value;
  document.getElementById('f-caller-avatarimg').oninput = e => editorScenario.caller.avatarImage = e.target.value;
  document.getElementById('f-caller-badge').oninput = e => editorScenario.caller.badge = e.target.value;
  document.getElementById('f-description').oninput = e => editorScenario.description = e.target.value;
  document.getElementById('f-start').onchange = e => editorScenario.start = e.target.value;
  document.getElementById('f-autolose-title').oninput = e => editorScenario.autoLose.title = e.target.value;
  document.getElementById('f-autolose-story').oninput = e => editorScenario.autoLose.story = e.target.value;
  document.getElementById('f-autolose-tactic').oninput = e => editorScenario.autoLose.tactic = e.target.value;

  // node-level bindings
  document.querySelectorAll('.f-text').forEach(el => el.oninput = e => findNode(e.target.dataset.node).text = e.target.value);
  document.querySelectorAll('.f-title').forEach(el => el.oninput = e => findNode(e.target.dataset.node).title = e.target.value);
  document.querySelectorAll('.f-story').forEach(el => el.oninput = e => findNode(e.target.dataset.node).story = e.target.value);
  document.querySelectorAll('.f-tactic').forEach(el => el.oninput = e => findNode(e.target.dataset.node).tactic = e.target.value);
  document.querySelectorAll('.f-image').forEach(el => el.oninput = e => findNode(e.target.dataset.node).image = e.target.value);
  document.querySelectorAll('.f-endtype').forEach(el => el.onchange = e => { findNode(e.target.dataset.node).endingType = e.target.value; renderEditor(); });

  document.querySelectorAll('.f-choice-text').forEach(el => el.oninput = e => findNode(e.target.dataset.node).choices[+e.target.dataset.idx].text = e.target.value);
  document.querySelectorAll('.f-choice-stress').forEach(el => el.oninput = e => findNode(e.target.dataset.node).choices[+e.target.dataset.idx].stress = parseInt(e.target.value)||0);
  document.querySelectorAll('.f-choice-suspicion').forEach(el => el.oninput = e => findNode(e.target.dataset.node).choices[+e.target.dataset.idx].suspicion = parseInt(e.target.value)||0);
  document.querySelectorAll('.f-choice-target').forEach(el => el.onchange = e => {
    const node = findNode(e.target.dataset.node);
    const idx = +e.target.dataset.idx;
    if(e.target.value === '__new__'){
      const newId = 'n' + (editorScenario.counter++);
      editorScenario.nodes.push(createBlankMessageNode(newId));
      node.choices[idx].target = newId;
    } else {
      node.choices[idx].target = e.target.value;
    }
    renderEditor();
  });

  document.querySelectorAll('.node-type-select').forEach(el => el.onchange = e => {
    const id = e.target.dataset.node;
    const idx = editorScenario.nodes.findIndex(n => n.id === id);
    editorScenario.nodes[idx] = e.target.value === 'ending' ? createBlankEndingNode(id) : createBlankMessageNode(id);
    renderEditor();
  });

  document.querySelectorAll('[data-remove]').forEach(el => el.onclick = () => {
    const id = el.dataset.remove;
    if(editorScenario.nodes.length <= 1){ alert('Должен остаться хотя бы один узел.'); return; }
    editorScenario.nodes = editorScenario.nodes.filter(n => n.id !== id);
    editorScenario.nodes.forEach(n => { if(n.type==='message') n.choices.forEach(c => { if(c.target===id) c.target=''; }); });
    if(editorScenario.start === id) editorScenario.start = editorScenario.nodes[0].id;
    renderEditor();
  });

  document.getElementById('btnAddNode').onclick = () => {
    const newId = 'n' + (editorScenario.counter++);
    editorScenario.nodes.push(createBlankMessageNode(newId));
    renderEditor();
  };
  document.getElementById('btnCancelEditor').onclick = openLibrary;
  document.getElementById('btnSaveScenario').onclick = () => saveEditorScenario(false);
  document.getElementById('btnExportScenario').onclick = () => saveEditorScenario(true);
  document.getElementById('btnTestScenario').onclick = testEditorScenario;
}

function findNode(id){ return editorScenario.nodes.find(n => n.id === id); }

function validateEditor(){
  const errs = [];
  if(!editorScenario.caller.name.trim()) errs.push('Укажи имя звонящего.');
  if(!editorScenario.start) errs.push('Выбери стартовый узел.');
  editorScenario.nodes.forEach(n => {
    if(n.type === 'message'){
      if(!n.text.trim()) errs.push(`Узел ${n.id}: пустой текст реплики.`);
      n.choices.forEach((c, i) => {
        if(!c.text.trim()) errs.push(`Узел ${n.id}, вариант ${i+1}: пустой текст ответа.`);
        if(!c.target) errs.push(`Узел ${n.id}, вариант ${i+1}: не выбран переход.`);
      });
    } else {
      if(!n.title.trim() || !n.story.trim() || !n.tactic.trim()) errs.push(`Узел ${n.id}: заполни заголовок, историю и приём мошенника.`);
    }
  });
  return errs;
}

function buildRuntimeScenario(){
  const nodes = {};
  editorScenario.nodes.forEach(n => {
    nodes[n.id] = n.type === 'ending'
      ? { ending:n.endingType, title:n.title, story:n.story, tactic:n.tactic, image:n.image || undefined }
      : { text:n.text, choices:n.choices.map(c => ({text:c.text, next:c.target, stress:c.stress, suspicion:c.suspicion})) };
  });
  const scenario = {
    id: editorScenario.id, builtin:false, hidden:false,
    description: editorScenario.description,
    caller: {...editorScenario.caller},
    start: editorScenario.start,
    nodes
  };
  if(editorScenario.autoLose.title || editorScenario.autoLose.story || editorScenario.autoLose.tactic){
    scenario.autoLose = {...editorScenario.autoLose};
  }
  return scenario;
}

function saveEditorScenario(alsoExport){
  const errs = validateEditor();
  if(errs.length){ alert('Не всё готово:\n\n' + errs.slice(0,6).join('\n') + (errs.length>6 ? `\n...и ещё ${errs.length-6}` : '')); return; }
  const scenario = buildRuntimeScenario();
  if(alsoExport){
    const data = JSON.stringify(scenario, null, 2);
    const blob = new Blob([data], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = scenario.id + '.json'; a.click();
    URL.revokeObjectURL(url);
  } else {
    SCENARIOS[scenario.id] = scenario;
    openLibrary();
  }
}

function testEditorScenario(){
  const errs = validateEditor();
  if(errs.length){ alert('Прежде чем тестировать, заполни:\n\n' + errs.slice(0,6).join('\n') + (errs.length>6 ? `\n...и ещё ${errs.length-6}` : '')); return; }
  TEST_SCENARIO = buildRuntimeScenario();
  state.testMode = true;
  startConversation('__test__');
}

/* init */
buildBuildings();
resetStreet();
</script>
